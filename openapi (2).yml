  /binders/{collId}/fields/{customName}/item-list:
    get:
      summary: Retrieves available dropdown list items.
      operationId: getItemsList
      description: |
        This service retrieves the list of available dropdown list items.
        
        This service requires "admin_documents_types" permission (Dropdown List Administration).
      tags:
        - Dropdown List
      parameters:
        - $ref: "#/components/parameters/CollId"
        - name: customName
          in: path
          description: Unique identifier of the dropdown list index field from which the items must be retrieved.
          required: true
          schema:
            type: string
            example: "custom_n1"
        - name: onlyDeletable
          in: query
          description: |
            false = No effect. 
            
            true = Retrieve only items that are neither associated with non-deleted documents nor referenced by dependent dropdown lists.
          required: false
          schema:
            type: boolean
            example: false
        - name: itemIds
          in: query
          description: Optional. An array of elements identified by their ID. Allows you to retrieve only the identified elements, with all their values.
          required: false
          schema:
            type: array
            items:
              type: integer
            example: [44, 45]
          style: form
          explode: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      nb:
                        type: integer
                        description: Number of items returned.
                      items:
                        type: array
                        description: List of items returned.
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            label:
                              type: string
                      action:
                        type: string
                      nClient:
                        type: integer
                      collId:
                        type: string
                      columnName:
                        type: string

    post:
      summary: Adds items to a dropdown list.
      operationId: addItemsList
      description: |
        This service allows to add items to a dropdown list.
        
        This service requires "admin_documents_types" permission (Dropdown List Administration).
      tags:
        - Dropdown List
      parameters:
        - $ref: "#/components/parameters/CollId"
        - name: customName
          in: path
          description: Unique identifier of the dropdown list index field from which the items must be retrieved.
          required: true
          schema:
            type: string
            example: "custom_n1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  description: An array of items to add.
                  items:
                    type: object
                    required:
                      - label
                    properties:
                      label:
                        type: string
                        description: Mandatory, item label
                      parentId:
                        type: integer
                        description: Optional. Parent number.
                      creditDebit:
                        type: string
                        description: Optional. Accounting allocation. "C" for credit, "D" for debit.
                        enum: [ C, D ]
                        example: "C"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      nb:
                        type: integer
                        description: Number of items actually added.
                        example: 2
                      items:
                        type: array
                        description: |
                          List of items added (Status: Added) 
                          
                          List of items refused (Other Status)
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                              description: Result for this item. "Added" if successful, other values indicate refusal reason.
                            entry:
                              type: object
                              properties:
                                id:
                                  type: string
                                  description: Always contains "Id" and "Label"
                                label:
                                  type: string
                      action:
                        type: string
                        example: "Add"
                      nClient:
                        type: integer
                        example: 413
                      collId:
                        type: string
                      columnName:
                        type: string

    patch:
      summary: Modifies dropdown list items.
      operationId: updateItemsList
      description: |
        This service allows to modify items of a dropdown list.
        
        This service requires "admin_documents_types" permission (Dropdown List Administration).
      tags:
        - Dropdown List
      parameters:
        - $ref: "#/components/parameters/CollId"
        - name: customName
          in: path
          description: Unique identifier of the dropdown list index field from which the items must be retrieved.
          required: true
          schema:
            type: string
            example: "custom_n1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  description: List of items to update. Each item must have an id.
                  items:
                    type: object
                    required:
                      - id
                    properties:
                      id:
                        type: integer
                        description: Required. Unique identifier of the item to modify.
                        example: 1
                      label:
                        type: string
                        description: Optional. New item label.
                      parentId:
                        type: integer
                        description: Optional. New parent item ID.
                        example: 0
                      creditDebit:
                        type: string
                        description: Optional. Accounting allocation. C for credit, D for debit.
                        enum: [ C, D ]
                        example: "C"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      nb:
                        type: integer
                        description: Number of items modified.
                        example: 2
                      items:
                        type: array
                        description: List of items updated or refused, with values before and after modification.
                        items:
                          type: object
                          properties:
                            Status:
                              type: string
                              description: Result for this item. "Updated" if successful, other values indicate refusal reason.
                              example: "Updated"
                            entry:
                              type: object
                              description: New values after modification.
                              properties:
                                id:
                                  type: string
                                label:
                                  type: string
                                parentId:
                                  type: string
                                creditDebit:
                                  type: string
                            originalEntry:
                              type: object
                              description: Original values before modification. Present only when Status is "Updated".
                              properties:
                                id:
                                  type: string
                                label:
                                  type: string
                                parentId:
                                  type: string
                                creditDebit:
                                  type: string
                      action:
                        type: string
                        example: "Update"
                      nClient:
                        type: integer
                      collId:
                        type: string
                      columnName:
                        type: string

    delete:
      summary: Removes dropdown list items, use for small sets.
      operationId: deleteItemsList
      description: |
        This service allows to remove items from a dropdown list.

        Use this DELETE route for a small number of items.
        For bulk deletion, use the POST equivalent with a JSON body.

        This service requires "admin_documents_types" permission (Dropdown List Administration).
      tags:
        - Dropdown List
      parameters:
        - $ref: "#/components/parameters/CollId"
        - name: customName
          in: path
          description: Unique identifier of the dropdown list index field.
          required: true
          schema:
            type: string
            example: "custom_n1"
        - name: itemIds
          in: query
          description: List of item ids to delete.
          required: true
          schema:
            type: array
            items:
              type: integer
            example: [44, 45]
          style: form
          explode: false
      responses:
        '200':
          $ref: '#/components/responses/DeleteItemsListResponse'

  /binders/{collId}/fields/{customName}/remove-from-item-list:
    post:
      summary: Removes multiple dropdown list items via JSON body.
      operationId: deleteItemsListbatch
      description: |
        This service allows to remove multiple items from a dropdown list using a JSON body.
  
        This route should be used when the number of items is too large for query parameters.
  
        This service requires "admin_documents_types" permission (Dropdown List Administration).
