            type: string
            example: "custom_n1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemIds
              properties:
                itemIds:
                  type: array
                  description: List of item ids to delete.
                  items:
                    type: integer
                  example: [ 44, 45, 46 ]
      responses:
        '200':
          $ref: '#/components/responses/DeleteItemsListResponse'

