                        items:
                          type: object
                          properties:
                            resId:
                              type: integer
                              description: Linked document ID
                            collId:
                              type: string
                              description: Binder of the linked document

  /folders/autocomplete-search:
    get:
      summary: Searches links by name pattern.
      operationId: getDocFoldersAutocomplete
      description: |
        This service allows to retrieve all links with names similar to the searched pattern.
        This service requires "edit_doc_folders" or "docs_search" permission
      tags:
        - Documents Linking
      parameters:
        - name: term
          in: query
          description: Search pattern to match against link names.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    description: |
                      Matching links. (Key: link ID, Value: link name)
                    additionalProperties:
                      type: string

  /groups:
    get:
      summary: Lists groups and their users with access type.
      operationId: getGroupList
      description: |
        This service allows to list one or all groups and the users who have access to them.
        
        In the users field of the response, each user ID is associated with a value:
        - 0 = added directly to the group
        - 1 = access granted through a role
        - 2 = both added directly and granted access through a role
        
        This service requires "admin_users" permission (user administration).
      tags:
        - Groups
      parameters:
        - name: groupId
          in: query
          description: Group ID to retrieve. If not specified, all groups are retrieved.
          required: false
          schema:
            type: string
        - name: collId
          in: query
          description: Binder ID to filter the groups.
          required: false
          schema:
            type: string
        - name: isTechAccount
          in: query
          description: Whether to retrieve groups for a technical account.
          required: false
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      response:
                        type: object
                        description: |
                          Groups indexed by their ID. Each group contains its description,
                          binder ID, and the list of users with their access type.
                        additionalProperties:
                          type: object
                          properties:
                            groupDesc:
                              type: string
                              description: Group description
                            collId:
                              type: string
                              description: Binder ID associated to the group
                            users:
                              type: object
                              description: |
                                Users in the group. (Key: user ID, Value: access type — 0: direct, 1: role, 2: both)
                              additionalProperties:
                                type: integer
                                enum: [ 0, 1, 2 ]
                              example:
                                userId1: 1
                                userId2: 0
                                userId3: 2

  /users/{userId}/add-to-groups:
    post:
      summary: Adds a user to groups.
      operationId: addGroups
      description: |
        This service allows to add a user to a list of groups.

        This service requires «admin_users» access (user administration).
      tags:
        - Groups
      parameters:
        - name: userId
          in: path
          description: User ID.
          required: true
          schema:
            type: string
        - name: isTechAccount
          in: query
          description: Whether the target user is a technical account.
          schema:
            type: boolean
            example: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - groupIds
              properties:
                groupIds:
                  type: array
                  description: List of group IDs to add the user to. Each ID must only contain alphanumeric characters or underscores.
                  items:
                    type: string
                  example: [ "Group_Id1", "Group_Id2" ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /users/{userId}/groups:
