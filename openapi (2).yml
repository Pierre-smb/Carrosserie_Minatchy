                - roleIds
              properties:
                roleIds:
                  type: array
                  description: List of role IDs to remove the user from. Each ID must be a positive integer.
                  items:
                    type: integer
                    minimum: 1
                  example: [ 1, 2, 3 ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /context:
    get:
      summary: Authenticates user and retrieves binders, rights, and configsets.
      operationId: getRights
      description: |
        This service allows:

        1. to test the Login IDs

        2. to retrieve the document binders to which the user has access

        3. to retrieve the binder index plan

        4. to retrieve the user's rights within these binders.

        This service also allows you to retrieve certain configsets (from a whitelist) that apply to the filing cabinet and its binders.
      tags:
        - Login
      parameters:
        - name: getConfigSets
          in: query
          schema:
            type: boolean
            example: false
          description: Whether to load config sets
      responses:
        '200':
          description: User context retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRightsResponse'

components:
  securitySchemes:
    ZeendocSession:
      type: apiKey
      in: cookie
      name: Cookie

  parameters:
    CollId:
      name: collId
      in: path
      required: true
      description: Binder
      schema:
        type: string
        example: coll_1

    ResId:
      name: resId
      in: path
      required: true
      description: Document identifier within the Zeendoc binder
      schema:
        type: integer

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        
    ShareId:
      name: shareId
      in: path
      required: true
      description: Sharing number visible from the user interface
      schema:
        type: integer
        
  requestBodies:
    SourceBodyCreate:
      required: true
      content:
        application/json:
          schema:
            allOf:
              - type: object
                properties:
                  collId:
                    type: string
                    description: Binder.
                    example: "coll_1"
              - $ref: "#/components/schemas/SourceInput"

    SourceBodyUpdate:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SourceInput"

  schemas:
    SuccessResult:
      type: object
      properties:
        result:
          type: string
          example: "Success"

    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        department:
          type: string
        email:
          type: string
          format: email
        isTechAccount:
          type: boolean
          example: false

    UsersResponse:
      type: object
      properties:
        response:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UserRead'
          example:
            "{userId}":
              firstname: "string"
              lastname: "string"
              department: "string"
              mail: "user@example.com"
              enabled: 0
              groups:
                - "{groupName}": 0
              roles:
                - "string"

    UserRead:
      type: object
      properties:
        firstname:
          type: string
        lastname:
          type: string
        department:
          type: string
        mail:
          type: string
          format: email
        enabled:
          type: integer
          enum: [ 0, 1 ]
        groups:
          type: array
          items:
            type: object
            additionalProperties:
              type: integer
              description: |
                Indicates how a user was granted access to a group: directly added (0), via a role (1), or both (2)
        roles:
          type: array
          description: Liste des identifiants de rôles
          items:
            type: string

    CreateUserBody:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
          description: User’s first name.
        lastName:
          type: string
          description: User’s last name.
        email:
          type: string
          description: |
            User’s email.
            
            It must be different from the email addresses already present in the filing cabinet.
          format: email
        department:
          type: string
          description: User's entity.
        isTechAccount:
          type: string
          enum: [ true, false ]
          example: false

    ValidationErrorResponse:
      type: object
      properties:
        field:
          type: string
        error:
          type: string

    UpdateUserBody:
      type: object
      description: At least one of firstName, lastName, email, or department is required
      properties:
        firstName:
          type: string
          description: User’s first name. If this field is empty, the current first name is used.
        lastName:
          type: string
          description: User’s last name. If this field is empty, the current last name is used.
        email:
          type: string
          description: User’s email. If this field is empty, the current email address is used.
          format: email
        department:
          type: string
          description: |
            User’s entity. If this field is empty, the current entity is used 
            
            If this field is set to «null», the entity will be empty.

    GetDocumentResponse:
      allOf:
        - type: object
          required: [ Document ]
          properties:
            document:
              $ref: "#/components/schemas/document"

    SearchDocumentsResponse:
      allOf:
        - type: object
          required: [ nbDocs, stats, document ]
          properties:
            nbDocs:
              type: integer
            stats:
              type: array
              items: { }
            document:
              type: array
              items:
                $ref: "#/components/schemas/document"

    CountDocumentsResponse:
      allOf:
        - type: object
          required: [ nbDocs ]
          properties:
            nbDocs:
              type: integer

    document:
      type: object
      required: [ resId, collId, properties, indexes ]
      properties:
        resId:
          type: integer
        collId:
          type: string
        properties:
          type: array
          items: { }
        indexes:
          type: array
          items: { }
      additionalProperties: true

    BaseSearchCountDocumentsBody:
      type: object
      properties:
        indexList:
          type: array
          items:
            $ref: "#/components/schemas/SearchIndexDefinition"
        strictMode:
          type: integer
          description: |
            false = for «Text» search criteria, the documents returned will be those containing the provided value (default). <br/>
            true = for «Text» search criteria, the documents returned will be those whose indexing value is equal to the value provided.
          example: 0
          enum: [ 0, 1 ]
        orderCol:
          type: string
          description: Field on which to sort the results (default = creation_date)
          example: Creation_Date
        order:
          type: string
          enum: [ ASC, DESC ]
          description: ASC = ascending sort (default if the sort field is not a date field) DESC = descending sort (default if the sort field is a date field)
          example: DESC
        savedQueryId:
          type: integer
          description: Identifiant de la recherche enregistrée à rappeler (il faut soit indiquer un ou plusieurs critères de recherche, soit rappeler une recherche enregistré, mais un mix des deux ne prend en compte que la recherche enregistrée).
        savedQueryName:
          type: string
          description: Nom de la recherche enregistrée à rappeler (il faut soit indiquer un ou plusieurs critères de recherche, soit rappeler une recherche enregistré, mais un mix des deux ne prend en compte que la recherche enregistrée).
          example: ""
        queryOperator:
          type: string
          enum: [ AND, OR ]
          description: Operator between the different search criteria. “AND” (default) or “OR”

    CountDocumentBody:
      allOf:
        - $ref: '#/components/schemas/BaseSearchCountDocumentsBody'
        - type: object
          properties:
            fuzzy:
              type: string
              description: |
                Level of fuzziness for the document content search Only valid if the search field is «plain_text». <br/><br/>
                Exact or empty (default) = Only documents containing the specified term are searched <br/>
                Flou = Documents containing similar terms to the specified one are returned <br/>
                FlouFlou = Documents containing similar terms to the similar ones are also returned.
              example: ""

    SearchDocumentBody:
      allOf:
        - $ref: '#/components/schemas/BaseSearchCountDocumentsBody'
        - type: object
          properties:
            from:
              type: integer
              minimum: 0
              description: Indicates from which document to retrieve the results.
              example: 0
            nbResults:
              type: integer
              minimum: 1
              description: Indicates the maximum number of results to retrieve. By default 50
              example: 50
            wantedColumns:
              $ref: "#/components/schemas/WantedColumns"
            value1:
              type: string
              description: This is the value that will replace our wildcard in a saved search used for Select2Search
              example: ""
            urlIndependent:
              type: boolean
              description: "Defines the directory where thumbnails and documents are retrieved. Different from 1: retrieval from a client-related directory. 1: retrieval from a directory common to all clients."

    WantedColumns:
      type: string
      example: ""

    SearchIndexDefinition:
      allOf:
        - $ref: "#/components/schemas/IndexDefinition"
        - type: object
          properties:
            operator:
              type: string
              example: "EQUALS"
            startValue:
              type: string
              example: ""
            endValue:
              type: string
              example: ""
            fuzzy:
              type: string
              example: ""

    IndexDefinition:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
          example: ""
        value:
          type: string
          example: ""

    RoleResponse:
      type: object
      properties:
        collId:
          type: string
        roleTitle:
          type: string
        groups:
          type: array
          items:
            type: string
        users:
          type: array
          items:
            type: string

    SourceListResponse:
      type: object
      properties:
        nbSources:
          type: integer
          example: 52
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'

    Source:
      type: object
      properties:
        sourceId:
          type: string
        title:
          type: string
          nullable: true
        collId:
          type: string
        userId:
          type: string
        sourceTypeId:
          type: string
        parameters:
          nullable: true
        indexation:
          nullable: true
        ocrLevel:
          type: string
        automaticReadingLevel:
          type: string
        barCodeDetectionLevel:
          type: string
        separatorDetectionLevel:
          type: string
        stampSeparatorDetectionLevel:
          type: string
        markerDetectionLevel:
          type: string
        pdfaConvertLevel:
          type: string
        lastDocumentDate:
          type: string
        compression:
          type: string
        urlClient:
          type: string
        user:
          type: string

    GetRightsResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            userId: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            mail: { type: string }
            department: { type: string, nullable: true }
            mailSurDepot: { type: integer }
            derniereConnexion: { type: string }
            prefs: { type: object }
            estSuperAdmin: { type: integer }
        client:
          type: object
          properties:
            status:
              type: array
              items: { type: string }
            configSets:
              type: array
              items:
                type: object
                properties:
                  idClientSetting: { type: integer }
                  idSetting: { type: integer }
                  label: { type: string }
                  labelIHM: { type: string }
                  typeAffectation: { type: string }
                  idAffectation: { type: string }
                  value: { }

        collectionsOrdonnees:
          type: array
          items: { type: string }

        collections:
          type: array
          items:
            type: object
            properties:
              collId: { type: string }
              label: { type: string }

              index:
                type: array
                items:
                  type: object
                  properties:
                    index_Id: { type: string }
                    label: { type: string }
                    mandatory: { type: integer }
                    is_ListChoice: { type: integer }
                    is_Date: { type: integer }
                    is_Numeric: { type: integer }
                    is_Autocomplete: { type: integer }
                    is_Multivalued: { type: integer }
                    type: { type: string }
                    possible_Value:
                      type: object
                      additionalProperties: true

              ConfigSets:
                type: array
                items:
                  type: object
                  properties:
                    Id_Client_Setting: { type: integer }
                    Id_Setting: { type: integer }
                    Label: { type: string }
                    Label_IHM: { type: string }
                    Type_Affectation: { type: string }
                    Id_Affectation: { type: string }
                    Value: { }
              Rights:
                type: object
                properties:
                  Can_Upload_Doc: { type: integer }
                  Can_Search_Docs: { type: integer }
                  Can_View_Doc: { type: integer }
        Service:
          type: object
          description: Available features for the user

    SourceInput:
      type: object
      properties:
        sourceTypeId:
          type: integer
          description: |
            ID of the source type.
            
            Cannot be changed for an existing source.
            
            Available values:
            - 2: HTML
            - 3: Emails
            - 51: Agent
            - 54: FTP
            - 55: Chorus Pro
            - 56: Invoice collectors
            - 57: Form
          example: 2

        title:
          type: string
          description: Source title.
          example: ""

        parameters:
          type: object
          description: Source settings.
          properties:
            emailDepositAddress:
              type: string
              description: |
                Mandatory for email sources.
                
                Cannot be changed once set.
              example: ""
            emailDepositType:
              type: string
              description: |
                Mandatory for email sources.
                
                Type of data retrieved from the email.
                
                Available values:
                - TXT: Text
                - PJ: Attachments
                - IMAGES: Images larger than 2KB
                - TXT_PJ: Text + Attachments
                - IMAGES_PJ: Images larger than 2KB + attachments
              example: "TXT"
            techUserChorusLogin:
              type: string
              description: For Chorus Pro sources.
              example: ""
            techUserChorusPassword:
              type: string
              description: For Chorus Pro sources.
              example: ""

        processing:
          type: object
          description: Source processing configuration.
          properties:
            ocrLevel:
              type: integer
              description: |
                OCR processing.
                
                Available values:
                - 0: None
                - 1: Yes, with automatic detection
                - 2: Yes, even on digital documents
                - 3: Yes, with automatic detection, no automatic rotation
              example: 1

            automaticReadingLevel:
              type: integer
              description: |
                IDP processing.
                
                Available values:
                - 1: Yes
                - 2: Yes + automatic cutting
                - 3: Yes + cumulation
                - 4: Yes + cutting + recognised page deletion
                - 5: No
              example: 5

            barCodeDetectionLevel:
              type: integer
              description: |
                Barcode detection.
                
                Available values:
                - 1: Yes
                - 2: Yes + cutting on NEWDOC
                - 3: Yes, preferably on original if PDF version
                - 5: No
              example: 5

            separatorDetectionLevel:
              type: integer
              description: |
                Separator / blank page detection.
                
                Available values:
                - 0: No
                - 1: Yes
              example: 0

            stampSeparatorDetectionLevel:
              type: integer
              description: |
                Separator stamps.
                
                Available values:
                - 0: No
                - 1: Yes
              example: 0

            markerDetectionLevel:
              type: integer
              description: |
                Highlighter cut.
                
                Available values:
                - 0: No
                - 1: Yes
              example: 0

            pdfaConvertLevel:
              type: integer
              description: |
                PDF/A validation/conversion.
                
                Available values:
                - 0: No
                - 1: Yes
                - 2: Yes, new method
              example: 0

            compression:
              type: integer
              description: |
                Zeendoc PDF compression.
                
                Available values:
                - 0: None
                - 1: High resolution / low compression
                - 2: Medium resolution / medium compression
                - 3: Low resolution / high compression
              example: 0

        indexation:
          type: object
          description: Source pre-indexing.
          additionalProperties: true
          example:
            custom_n1: ""
            custom_n2: ""

  responses:
    DeleteItemsListResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              nb:
                type: integer
                description: Number of items deleted.
                example: 2
              items:
                type: array
                description: List of items deleted or refused.
                items:
                  type: object
                  properties:
                    status:
                      type: string
                      example: "Deleted"
                    entry:
                      type: object
                      properties:
                        id:
                          type: string
                          example: "123"
              action:
                type: string
                example: "DELETE"
              nClient:
                type: integer
                example: 413
              collId:
                type: string
                example: "coll_1"
              columnName:
                type: string
                example: "custom_n1"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    Forbidden:
      description: Forbidden - insufficient permissions
