openapi: 3.0.3
info:
  title: Zeendoc REST API
  version: 4.0.0

servers:
  - url: ../../api/{version}
    variables:
      version:
        default: v4

security:
  - ZeendocSession: [ ]

tags:
  - name: Login
    description: Authenticate a user and generate a session cookie

  - name: Documents Linking
    description: Operations related to document linking

  - name: Documents Management
    description: Operations related to document creation, update, deletion and state management

  - name: Documents Search
    description: Operations related to document search and filtering

  - name: Documents Sharings
    description: Operations related to sharing documents

  - name: Dropdown List
    description: Dropdown list item management

  - name: Groups
    description: Operations related to groups

  - name: History Access
    description: Log recovery, system log and document log

  - name: Sources
    description: Operations related to sources

  - name: Users
    description: Operations related to users

paths:
  /login:
    post:
      summary: Authenticates a user and returns a session cookie for subsequent requests.
      description: |
        This service allows to authenticate a user and generate a session cookie that can be used for the next calls. 
        
        This avoids having to enter the identifiers for each call to the WS.
      tags:
        - Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
              properties:
                login:
                  type: string
                  description: Login ID
                  example: john.doe@example.com
                password:
                  type: string
                  format: password
                  description: Plain text password
                  example: "**********"
      responses:
        "200":
          description: Authentification réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  cookie:
                    type: string
                    description: Cookie de session à utiliser pour les requêtes suivantes
                    example: "ZeenDoc=abc123xyz"
                  cookieDuration:
                    type: string
                    description: Durée de validité du cookie (90% de session.gc_maxlifetime)
                    example: "38880s"

  /binders/{collId}/documents:
    get:
      summary: Retrieves document details and download links for PDF and original files.
      operationId: getDocument
      description: This service allows you to retrieve all the information related to a document, as well as a link to download the PDF and original versions of the document
      tags:
        - Documents Search
      parameters:
        - $ref: "#/components/parameters/CollId"
        - name: resId
          in: query
          description: |
            Unique document ID for the specified binder. <br/>
            Note: it is not necessary to specify ResId AND UploadId, one of the two is enough (but at least one of the two must be present)
          schema:
            type: integer
            example: 1
        - name: wantedColumns
          in: query
          description: |
            List of indexes and properties of the document for which we want to retrieve the value. <br/>
            String of characters with properties separated by commas. <br/>
            If the setting is not present or empty, only returns document Res_Id and Coll_Id
          schema:
            $ref: "#/components/schemas/WantedColumns"
        - name: comments
          in: query
          description: |
            Indicator that allows to specify whether or not to retrieve the comments (+stamps) in the PDF version of the document. <br/> 
            false or empty = the PDF file is retrieved without the comments/stamps <br/>
            true = the PDF file is retrieved with the comments and stamps.
          schema:
            type: boolean
            example: false
        - name: uploadId
          in: query
          description: |
            Unique document upload ID for the specified binder <br/>
            Ex : Upload_Id=46PBolM5XnCThWNzDYUHK7s0k2ZJVfcI <br/>
            Note: it is not necessary to specify ResId AND UploadId, one of the two is enough (but at least one of the two must be present)
          schema:
            type: string
            example: ""
        - name: lineConfigFileName
          in: query
          description: |
            Configuration file to use to retrieve the lines extracted from the document (provided that a line extraction has been configured in the binder). <br/> 
            Attention, document line extraction slows down the information retrieval. <br/>
            Leave empty if document line extraction is not required.
          schema:
            type: string
            example: ""
        - name: urlIndependent
          in: query
          description: |
            Defines the directory where thumbnails and documents are retrieved. <br/>
            false: client-related directory. <br/>
            true: shared directory across all clients.
          schema:
            type: boolean
            example: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDocumentResponse"

    post:
      summary: Sends a document through the processing chain.
      operationId: uploadDoc
      description: This service allows a document to be sent through the processing chain.
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileName
                - base64Document
                - hash
              properties:
                fileName:
                  type: string
                  description: |
                    File name. Leave the extension in the name. <br/>
                    Ex: Invoice_08_2020.pdf
                  example: ""
                base64Document:
                  type: string
                  description: Document content in base64.
                  example: ""
                hash:
                  type: string
                  description: Hash of the uploaded document content. Currently, the hash is sha3-256
                  example: ""
                sourceId:
                  type: integer
                  description: |
                    The Id of the source which will upload the document. <br/>
                    If it is not specified, the system checks whether a "WebServices" source exists to use it automatically. <br/>
                    If no source of this type exists, it is automatically created before use.
                  example: null
                indexation:
                  type: object
                  description: Json of the index fields to apply at upload.
                folder:
                  type: string
                  description: Directory, if the source is used by an agent
                  default: ""
                computerId:
                  type: string
                  description: Unique identifier of the calling station if the source is used by an agent
                  default: ""
      responses:
        '200':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploadId:
                    type: string

  /binders/{collId}/documents/{resId}:
    delete:
      summary: Deletes a document from a binder.
      operationId: deleteDoc
      description: |
        This service allows to delete a document from a binder.
        This service requires "docs_delete_doc" permission
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      responses:
        '200':
          description: Document deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Document deleted successfully"

  /binders/{collId}/documents/{resId}/indexes:
    patch:
      summary: Updates a document’s indexing, only specified fields are modified.
      operationId: updateDocPartial
      description: |
        This service allows to update a document indexing in a binder.
        
        Only the specified index fields are overwritten with the specified values, the others are left unchanged.
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                indexList:
                  type: array
                  description: |
                    An array of objects containing the following properties: <br/><br/>
                    Id -> Unique identifier of the object in the binder (e.g.: 1, 2, 3, ...) <br/>
                    Label -> Identifier of the index field to modify (Ex.: custom_f3) <br/>
                    Value -> New value for the field In case of multivalued fields, it is possible to define several objects redefining the same field. It is possible to give a value of 1 or 2 to N_Status (for "indexed" and "to index").
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                        example: ""
                      value:
                        type: string
                        example: ""
      responses:
        '200':
          description: Document updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Document updated successfully"

    put:
      summary: Resets all indexes and overwrites them with the provided values.
      operationId: updateDocAll
      description: |
        This service allows to update a document indexing in a binder.
        
        All indexes are reset to zero and overwritten with the provided index values.
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                indexList:
                  type: array
                  description: |
                    An array of objects containing the following properties: <br/><br/>
                    Id -> Unique identifier of the object in the binder (e.g.: 1, 2, 3, ...) <br/>
                    Label -> Identifier of the index field to modify (Ex.: custom_f3) <br/>
                    Value -> New value for the field In case of multivalued fields, it is possible to define several objects redefining the same field.
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                        example: ""
                      value:
                        type: string
                        example: ""
      responses:
        '200':
          description: Document updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Document updated successfully"

  /binders/{collId}/documents/{resId}/restore:
    post:
      summary: Restores a deleted document from a binder.
      operationId: restoreDoc
      description: This service allows to restore a document deleted from a binder.
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      responses:
        '200':
          description: Document restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Document restored successfully"

  /binders/{collId}/documents/search:
    post:
      summary: Searches documents by criteria or saved search.
      operationId: searchDocuments
      description: This service allows to search all documents matching certain criteria (or matching a preset saved search).
      tags:
        - Documents Search
      parameters:
        - $ref: "#/components/parameters/CollId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchDocumentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchDocumentsResponse"

  /binders/{collId}/documents/count:
    post:
      summary: Returns the number of results for a search.
      operationId: countDocuments
      description: |
        This service identifies the number of results of a search (or matching a preset search).
        It is slightly faster than the previous service and called with a subset of arguments from the previous service.
      tags:
        - Documents Search
      parameters:
        - $ref: "#/components/parameters/CollId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CountDocumentBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountDocumentsResponse"

  /binders/{collId}/documents/{resId}/shares:
    post:
      summary: Enables public sharing of a document from a binder.
      operationId: shareDoc
      description: This service allows the public sharing of a document archived in a binder in a Zeendoc filing cabinet.
      tags:
        - Documents Sharings
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                shareName:
                  type: string
                  description: Sharing name for the document
                  example: Name
                selectedVersion:
                  type: string
                  description: Possible choices PDF / Original
                  example: PDF
                  enum: [ PDF, Original ]
                pageSelectionType:
                  type: string
                  description: Selection of all document pages value “ALL” (default if not specified) or only certain pages, value “SELECT”
                  example: ALL
                  enum: [ ALL, SELECT ]
                selectedPages:
                  type: string
                  description: |
                    All by default or only certain pages (e.g. 2-4, 3;7 or 2-4;7-9). <br/>
                    Used in combination with Page_Selection_Type "SELECT". For all pages, must be left empty
                  example: ""
                sharingEndDate:
                  type: string
                  description: |
                    Specifies the date until when the document sharing will be active. <br/>
                    If not specified, the default duration is one month. <br/>
                    ‘Y-m-d’ format Example ”2024-06-12” for the date 12 June 2024
                  example: ""
      responses:
        '200':
          description: Document shared successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      filename:
                        type: string
                        description: Shared file name
                        example: basic_000.pdf
                      url:
                        type: string
                        description: Link to the file
                        example: https://zeendoc..
                      nPartage:
                        type: string
                        description: Generated share number
                        example: 1234
                      sharindEndDate:
                        type: string
                        description: Sharing expiry date
                        example: 2026-01-01

  /binders/{collId}/documents/{resId}/shares/{shareId}:
    delete:
      summary: Deletes a previously created public share.
      operationId: UnShareDoc
      description: This service allows to delete a previously created public sharing.
      tags:
        - Documents Sharings
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
        - $ref: "#/components/parameters/ShareId"

      responses:
        '200':
          description: Document shared successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  infos:
                    type: string
                    example: "Manually delete sharing. Sharing URL : https://zeendoc.."

  /history-document/search:
    post:
      summary: Retrieves document history with filters and pagination.
      operationId: getHistoryDoc
      description: |
        This service allows to retrieve the document history log.
        - The available filters are: Start date / End date, user, binder, action.
        - The sorting is always done on the event date parameter. You can select the sorting order.
        - The "From" and "Count" parameters allow to specify a range to retrieve (maximum 1000 items at a time).
        This service requires "view_doc_history" access (History: access to the document history).
      tags:
        - History Access
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dateStart:
                  type: string
                  example: "01/01/2026"
                dateEnd:
                  type: string
                  example: "03/01/2026"
                userId:
                  type: string
                  example: ""
                collId:
                  type: string
                  example: ""
                action:
                  type: string
                  example: "ADD_GROUP_EVENT"
                order:
                  type: string
                  enum: [ ASC, DESC ]
                  example: "ASC"
                from:
                  type: integer
                  example: 0
                count:
                  type: integer
                  example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      nb:
                        type: integer
                        description: Number of events retrieved in the response.
                        example: 50
                      logs:
                        type: array
                        description: Events retrieved
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            user:
                              type: string
                            action:
                              type: string
                            collection:
                              type: string
                            comment:
                              type: string
                            document:
                              type: string

  /history-system/search:
    post:
      summary: Retrieves system history with filters and pagination.
      operationId: getHistorySystem
      description: |
        This service allows to retrieve the system log.
        - The available filters are: Start date / End date, user, binder, action.
        - The sorting is always done on the event date parameter. You can select the sorting order.
        - The "From" and "Count" parameters allow to specify a range to retrieve (maximum 1000 items at a time).
        This service requires "view_system_history" access (History: access to the system history).
      tags:
        - History Access
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dateStart:
                  type: string
                  example: "01/01/2026"
                dateEnd:
                  type: string
                  example: "03/01/2026"
                userId:
                  type: string
                  example: ""
                collId:
                  type: string
                  example: ""
                action:
                  type: string
                  example: "ADD_GROUP_EVENT"
                order:
                  type: string
                  enum: [ ASC, DESC ]
                  example: "ASC"
                from:
                  type: integer
                  example: 0
                count:
                  type: integer
                  example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      nb:
                        type: integer
                        description: Number of events retrieved in the response.
                        example: 50
                      logs:
                        type: array
                        description: Events retrieved
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                            user:
                              type: string
                            action:
                              type: string
                            collection:
                              type: string
                            comment:
                              type: string

  /processing-files/{fileId}:
    get:
      summary: Searches in-process documents and returns their current status.
      operationId: searchProcessingFiles
      description: This service allows to search a client's documents currently in process and get relevant information such as its current processing status.
      tags:
        - Documents Search
      parameters:
        - name: fileId
          in: path
          description: ID of the file currently in process
          required: true
          schema:
            type: string
            example: "file_abc123"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      documents:
                        type: object
                        description: Informations about the documents currently in process.

  /processing-files:
    get:
      summary: Lists in-process documents grouped by collId.
      operationId: searchAllProcessingFile
      description: This service allows you to list a client's documents currently in process grouped by coll_id.
      tags:
        - Documents Search
      parameters:
        - name: collId
          in: query
          description: Binder ID
          schema:
            type: string
            example: "coll_1"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  documents:
                    type: object
                    description: Informations about the documents currently in process

  /binders/{collId}/saved-queries:
    get:
      summary: Lists accessible saved searches, optionally with result counts.
      operationId: getSavedQueries
      description: |
        This service allows the identification of the saved searches accessible by the user. <br/>
        - If `collId` is not specified correctly, the first binder found will be used, which may vary. It is strongly advised to specify it. <br/>
        - `getNbResult` allows to also retrieve the number of documents matching each saved search (slightly longer response time).<br/>
        This service requires "docs_search" permission.
      tags:
        - Documents Search
      parameters:
        - name: collId
          in: path
          description: Binder where to perform the search.
          required: true
          schema:
            type: string
            example: "coll_1"
        - name: nbResult
          in: query
          description: |
            Whether to also retrieve the number of documents matching each saved search.
            
            false = no, true = yes (slightly longer response time).
          required: false
          schema:
            type: boolean
            example: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  savedQueries:
                    type: object
                    description: Informations about the saved queries

  /binders/{collId}/fields/{customName}/autocomplete-search:
    get:
      summary: Retrieves matching autocomplete values for an index.
      operationId: getAutocompleteValues
      description: |
        This service retrieves all values from an index with autocompletion that matches text already entered by the user.
      tags:
        - Documents Search
      parameters:
        - name: collId
          in: path
          description: Binder where to perform the search. It is strongly advised to specify it.
          required: true
          schema:
            type: string
            example: "coll_1"
        - name: customName
          in: path
          description: Index field where to retrieve the possible values.
          required: true
          schema:
            type: string
            example: "custom_t1"
        - name: term
          in: query
          description: Text entered by the user to match against.
          required: true
          schema:
            type: string
            example: "pro"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  value:
                    type: object
                    description: Values from the index with autocompletion that match the text entered by the user

  /binders/{collId}/send:
    post:
      summary: Sends documents via a template using a saved search or document list.
      operationId: sendByModel
      description: |
        Trigger a sending based on a template, of a document list or a saved search result.
        
        At least one of the following must be provided: savedQueryId, savedQueryName, or resIds.
        The argument priority is: savedQueryId > savedQueryName > resIds.
      tags:
        - Documents Management
      parameters:
        - $ref: "#/components/parameters/CollId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sendModel
              properties:
                sendModel:
                  type: integer
                  description: Template ID.
                  example: 1
                savedQueryId:
                  type: integer
                  description: Saved search ID.
                  example: 1
                savedQueryName:
                  type: string
                  description: Saved search name.
                  example: "My saved search"
                resIds:
                  type: array
                  description: Document list.
                  items:
                    type: integer
                  example: [ 7074, 7075 ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                properties:
                  modeEnvoi:
                    type: string
                    example: "New"
                  action:
                    type: string
                    example: "EMAIL"
                  modelName:
                    type: string
                    example: "test"
                  version:
                    type: string
                    example: "PDF"

  /binders/{collId}/documents/{resId}/folders:
    get:
      summary: Retrieves a document’s links.
      operationId: getDocFolders
      description: |
        This service allows to retrieve the links of a document in a binder.
        This service requires "edit_doc_folders" or "docs_search" permission.
      tags:
        - Documents Linking
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      folders:
                        type: array
                        description: Array of links associated to the document.
                        items:
                          type: object
                          properties:
                            nFolder:
                              type: string
                              description: Link ID
                            name:
                              type: string
                              description: Link label
                            nbDocs:
                              type: string
                              description: Number of linked documents

    post:
      summary: Adds links to a document.
      operationId: setDocFolders
      description: |
        This service allows to add links to a document in a binder.
        This service requires "edit_doc_folders" permission.
      tags:
        - Documents Linking
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - labels
              properties:
                labels:
                  type: array
                  description: List of the links to add.
                  items:
                    type: string
                    description: Name of a link
                  example: [ "folder_1", "folder_2", "folder_3" ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      foldersInsert:
                        type: array
                        description: Names of the folders where the document has been added.
                        items:
                          type: string
  
  /binders/{collId}/documents/{resId}/remove-from-folders:
    post:
      summary: Removes links from a document.
      operationId: delDocFolders
      description: |
        This service allows to remove links to a document in a binder of a Zeendoc filing cabinet.
        This service requires "edit_doc_folders" permission.
      tags:
        - Documents Linking
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                labels:
                  type: array
                  description: List of folder labels to remove.
                  items:
                    type: string
                  example:
                    - label1
                    - label2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      foldersDel:
                        type: object
                        description: |
                          Links removed from the document. (Key: link ID, Value: link name)
                        additionalProperties:
                          type: string
                        example:
                          "{folderId}": "string"

  /binders/{collId}/documents/{resId}/linked-docs:
    get:
      summary: Retrieves all documents linked to a given document.
      operationId: getDocLinked
      description: |
        This service allows to retrieve all documents linked to a given document.
        This service requires "docs_search" permission.
      tags:
        - Documents Linking
      parameters:
        - $ref: "#/components/parameters/CollId"
        - $ref: "#/components/parameters/ResId"
      responses:
