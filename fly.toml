app = "carrosserie-minatchy"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  OR_EXTRACTOR_OUTPUT_DIR = "/tmp/or-extractor"
  OR_API_UPLOAD_OR = "true"
  OR_API_MARK_PROCESSED = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
